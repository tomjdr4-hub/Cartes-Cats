name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./module.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update module.json
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            data.version = '${{ steps.bump.outputs.version }}';
            data.download = 'https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.version }}/module.zip';
            fs.writeFileSync('module.json', JSON.stringify(data, null, 2) + '\n');
          "

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Create zip
        run: zip -r module.zip . -x ".git/*" ".github/*"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: |
            module.zip
            module.json
